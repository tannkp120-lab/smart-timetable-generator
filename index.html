            };

            const handleDelete = (itemType, itemId) => { setDeleteError(null); setItemToDelete({ type: itemType, id: itemId }); };
            const handleConfirmDelete = async () => { if (!itemToDelete) return; try { await deleteApi(`delete/${itemToDelete.type}/${itemToDelete.id}`, 'DELETE'); setItemToDelete(null); onDataReload(); } catch (err) { setDeleteError(err.message); } };

            const managementProps = { allData, onAddData, isLoading, apiError, onDelete: handleDelete, onViewProfile: handleViewProfile, onEdit: handleEdit };

            return (
                <div>
                    <div className="flex flex-wrap gap-2 justify-center bg-white p-4 rounded-lg shadow-sm">
                        {['generate', 'substitutions', 'timeslots', 'users', 'courses', 'streams', 'departments', 'classes', 'divisions', 'rooms', 'attendance', 'view_attendance'].map(tab => (
                            <StyledButton
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                color={activeTab === tab ? 'active' : 'default'}
                                className="m-1"
                            >
                                {tab === 'generate' ? 'Generator' :
                                    tab === 'timeslots' ? 'Time Slots' :
                                        tab === 'courses' ? 'Subjects' :
                                            tab === 'view_attendance' ? 'View Attendance' :
                                                tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </StyledButton>
                        ))}
                    </div>
                    <AnimatePresence mode="wait">
                        <motion.div key={activeTab} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }}>
                            {activeTab === 'generate' && (
                                <motion.div className="mt-10" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                                    <div className="w-full max-w-5xl mx-auto flex flex-col items-center bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-xl border border-gray-200">
                                        <h3 className="text-2xl font-extrabold text-indigo-700 mb-6 tracking-tight text-center">Select Parameters</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 w-full mb-6">
                                            <select value={selectedStream} onChange={handleStreamChange} className="w-full p-3 border rounded-lg"><option value="">Select Stream</option>{allData.streams?.map((s) => (<option key={s.id} value={s.id}>{s.name}</option>))}</select>
                                            <select value={selectedDepartment} onChange={handleDepartmentChange} disabled={!selectedStream} className="w-full p-3 border rounded-lg disabled:bg-gray-100"><option value="">Select Department</option>{filteredDepartments.map((d) => (<option key={d.id} value={d.id}>{d.name}</option>))}</select>
                                            <select value={selectedClass} onChange={(e) => setSelectedClass(e.target.value)} disabled={!selectedDepartment} className="w-full p-3 border rounded-lg disabled:bg-gray-100"><option value="">Select Class</option>{filteredClasses.map((c) => (<option key={c.id} value={c.id}>{c.name}</option>))}</select>
                                            <select value={selectedDivision} onChange={(e) => setSelectedDivision(e.target.value)} disabled={!selectedClass} className="w-full p-3 border rounded-lg disabled:bg-gray-100"><option value="">Select Division</option>{allData.divisions?.map((d) => (<option key={d.id} value={d.id}>{d.name}</option>))}</select>
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-4 mt-6 justify-center">
                                            <StyledButton onClick={() => { if (timetable && timetable.length > 0) { setCustomizingSession(null); setIsCustomizeModalOpen(true); } else alert("Please load a timetable first."); }} disabled={!timetable || timetable.length === 0}>Customize</StyledButton>
                                            <SparklyButton onClick={() => handleAction("fetch")} disabled={isFetching} clr={120}>{isFetching ? "Loading..." : "Show"}</SparklyButton>
                                            <ActionButton onClick={() => handleAction("generate")} disabled={isGenerating} color="indigo">{isGenerating ? "Generating..." : "Generate New"}</ActionButton>
                                        </div>
                                    </div>
                                    {(isGenerating || isFetching) && <p className="text-indigo-600 mt-4 text-center">Loading timetable...</p>}
                                    {(generationError || fetchError) && !String(generationError || fetchError).includes("404") && <div className="mt-6 bg-red-100 text-red-700 p-3 rounded-lg text-center"><strong>Error:</strong> {generationError || fetchError}</div>}

                                    {/* --- Pass onEdit handler to grid --- */}
                                    {timetable && timetable.length > 0 && <TimetableGrid ref={timetableGridRef} timetable={timetable} allData={allData} substitutions={gridSubstitutions} onEdit={handleCustomizeSession} />}

                                    {timetable?.length === 0 && <div className="mt-6 bg-yellow-100 text-yellow-800 p-3 rounded-lg text-center">No timetable has been generated for this class yet.</div>}
                                </motion.div>
                            )}

                            {activeTab === 'substitutions' && <SubstitutionManager allData={allData} />}
                            {activeTab === 'users' && <UserManagement {...managementProps} />}
                            {activeTab === 'streams' && <ManagementComponent title="Stream" apiEndpoint="streams" existingItems={allData.streams} formFields={[{ name: 'name', label: 'Stream Name', type: 'text', placeholder: 'e.g., Engineering' }]} {...managementProps} />}
                            {activeTab === 'departments' && <ManagementComponent title="Department" apiEndpoint="departments" existingItems={allData.departments} formFields={[{ name: 'name', label: 'Department Name', type: 'text', placeholder: 'e.g., Computer Engineering' }, { name: 'stream_id', label: 'Stream', type: 'select', options: allData.streams?.map(s => ({ value: s.id, label: s.name })) || [], disabled: !allData.streams }]} {...managementProps} />}
                            {activeTab === 'classes' && <ManagementComponent title="Class" apiEndpoint="classes" existingItems={allData.classes} formFields={[{ name: 'name', label: 'Class Name', type: 'text', placeholder: "e.g., First Year" }, { name: 'department_id', label: 'Department', type: 'select', options: allData.departments?.map(d => ({ value: d.id, label: d.name })) || [] }]} {...managementProps} />}
                            {activeTab === 'divisions' && <ManagementComponent title="Division" apiEndpoint="divisions" existingItems={allData.divisions} formFields={[{ name: 'name', label: 'Division Name', type: 'text', placeholder: "e.g., A" }]} {...managementProps} />}
                            {activeTab === 'courses' && <CourseManagement {...managementProps} />}
                            {activeTab === 'rooms' && <ManagementComponent title="Room" apiEndpoint="rooms" existingItems={allData.rooms} formFields={[{ name: 'name', label: 'Room Name', type: 'text', placeholder: 'e.g., Room 103' }, { name: 'capacity', label: 'Capacity', type: 'number', min: 1 }, { name: 'type', label: 'Room Type', type: 'select', options: [{ value: 'Lecture', label: 'Lecture' }, { value: 'Lab', label: 'Lab' }] }]} {...managementProps} />}
                            {activeTab === 'attendance' && <AttendanceManagement allData={allData} user={user} />}
                            {activeTab === 'timeslots' && <TimeslotManagement {...managementProps} />}
                            {activeTab === 'view_attendance' && <AttendanceStatsViewer allData={allData} />}
                        </motion.div>
                    </AnimatePresence>

                    {/* --- Modals --- */}
                    <CustomizeModal isOpen={isCustomizeModalOpen} onClose={() => setIsCustomizeModalOpen(false)} timetable={timetable} allData={allData} classId={selectedClass} divisionId={selectedDivision} onUpdate={setTimetable} initialSession={customizingSession} />
                    <ProfileModal isOpen={isProfileModalOpen} onClose={() => setIsProfileModalOpen(false)} user={selectedProfileUser} extraData={selectedProfileExtraData} />
                    <EditModal isOpen={isEditModalOpen} onClose={() => setIsEditModalOpen(false)} item={itemToEdit} onSave={handleSaveEdit} />

                    <AnimatePresence>
                        {itemToDelete && (
                            <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
                                <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
                                    <h3 className="text-xl font-bold mb-2">Confirm Deletion</h3>
                                    <p className="text-gray-700 mb-4">Are you sure you want to delete this {itemToDelete.type.slice(0, -1)}?</p>
                                    {deleteError && <p className="text-red-500 mb-2">{deleteError}</p>}
                                    <div className="flex justify-end gap-2 mt-6">
                                        <StyledButton onClick={() => setItemToDelete(null)} color="default" disabled={isDeleting}>Cancel</StyledButton>
                                        <StyledButton onClick={handleConfirmDelete} disabled={isDeleting} color="red">{isDeleting ? 'Deleting...' : 'Delete'}</StyledButton>
                                    </div>
                                </div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const LecturerStudentDashboard = ({ allData, user }) => {
            const [timetable, setTimetable] = useState(null);
            // --- NEW: State for substitutions in grid ---
            const [gridSubstitutions, setGridSubstitutions] = useState([]);
            const [mySchedule, setMySchedule] = useState(null);
            const [selectedStream, setSelectedStream] = useState('');
            const [selectedDepartment, setSelectedDepartment] = useState('');
            const [selectedClass, setSelectedClass] = useState('');
            const [selectedDivision, setSelectedDivision] = useState('');
            const [activeTab, setActiveTab] = useState('timetable');
            const { isLoading, error, callApi } = useApi(); // No fetchApi exposed by hook, use callApi

            const fetchTimetable = useCallback(async (classId, divisionId) => {
                if (!classId || !divisionId) { setTimetable(null); return; }
                setTimetable(null);
                setGridSubstitutions([]);
                try {
                    const data = await callApi(`timetables/${classId}/${divisionId}`);
                    setTimetable(data.timetable);

                    // --- NEW: Fetch substitutions for this class ---
                    const subData = await callApi(`substitutions?class_id=${classId}&division_id=${divisionId}&status=Approved`);
                    setGridSubstitutions(subData.substitutions || []);
                } catch (err) { if (String(err.message).includes("404")) setTimetable([]); }
            }, [callApi]);

            useEffect(() => { if (selectedClass && selectedDivision) fetchTimetable(selectedClass, selectedDivision); else setTimetable(null); }, [selectedClass, selectedDivision, fetchTimetable]);
            useEffect(() => {
                if (user.role === 'student' && allData.classes && allData.departments) {
                    const myClass = allData.classes.find(c => c.id === user.class_id);
                    const myDept = allData.departments.find(d => d.id === user.department_id);
                    if (myClass) setSelectedClass(myClass.id);
                    if (myDept) { setSelectedDepartment(myDept.id); setSelectedStream(myDept.stream_id); }
                    if (user.division_id) setSelectedDivision(user.division_id);
                }
                if (user.role === 'lecturer' && activeTab === 'my_schedule') {
                    callApi(`teacher/schedule/${user.id}`).then(data => setMySchedule(data.schedule));
                    // --- NEW: Fetch my substitutions ---
                    callApi(`substitutions?teacher_id=${user.id}&status=Approved`).then(data => setGridSubstitutions(data.substitutions || []));
                }
            }, [user, allData.classes, allData.departments, activeTab, callApi]);

            const handleStreamChange = (e) => { setSelectedStream(e.target.value); setSelectedDepartment(''); setSelectedClass(''); setSelectedDivision(''); };
            const handleDepartmentChange = (e) => { setSelectedDepartment(e.target.value); setSelectedClass(''); setSelectedDivision(''); };
            const handleClassChange = (e) => { setSelectedClass(e.target.value); setSelectedDivision(''); };
            const handleDivisionChange = (e) => { setSelectedDivision(e.target.value); };

            if (!allData.classes) return <div className="text-center p-8"><p className="text-gray-500">Loading data...</p></div>;

            return (
                <div>
                    <div className="flex flex-wrap justify-center gap-4 mb-6">
                        <StyledButton onClick={() => setActiveTab('timetable')} color={activeTab === 'timetable' ? 'active' : 'default'}>Class Timetable</StyledButton>
                        {user.role === 'lecturer' && (
                            <Fragment>
                                <StyledButton onClick={() => setActiveTab('my_schedule')} color={activeTab === 'my_schedule' ? 'active' : 'default'}>My Schedule</StyledButton>
                                <StyledButton onClick={() => setActiveTab('add_attendance')} color={activeTab === 'add_attendance' ? 'active' : 'default'}>Mark Attendance</StyledButton>
                                <StyledButton onClick={() => setActiveTab('view_students')} color={activeTab === 'view_students' ? 'active' : 'default'}>View Attendance</StyledButton>
                                {/* --- REMOVED Substitution Button --- */}
                            </Fragment>
                        )}
                        {user.role === 'student' && <StyledButton onClick={() => setActiveTab('view_attendance')} color={activeTab === 'view_attendance' ? 'active' : 'default'}>My Attendance</StyledButton>}
                    </div>

                    {activeTab === 'timetable' && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                            <div className="flex flex-wrap justify-center items-center gap-4 bg-white p-4 rounded-lg shadow mb-6">
                                <select value={selectedStream} onChange={handleStreamChange} className="p-2 border rounded-md" disabled={user.role === 'student'}><option value="">Select Stream</option> {allData.streams?.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select>
                                <select value={selectedDepartment} onChange={handleDepartmentChange} disabled={!selectedStream || user.role === 'student'} className="p-2 border rounded-md disabled:bg-gray-100"><option value="">Select Department</option> {allData.departments?.filter(d => d.stream_id == selectedStream).map(d => <option key={d.id} value={d.id}>{d.name}</option>)}</select>
                                <select value={selectedClass} onChange={handleClassChange} disabled={!selectedDepartment || user.role === 'student'} className="p-2 border rounded-md disabled:bg-gray-100"><option value="">Select Class</option> {allData.classes?.filter(c => c.department_id == selectedDepartment).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                                <select value={selectedDivision} onChange={handleDivisionChange} disabled={!selectedClass || user.role === 'student'} className="p-2 border rounded-md disabled:bg-gray-100"><option value="">Select Division</option> {allData.divisions?.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}</select>
                            </div>
                            {timetable && <TimetableGrid timetable={timetable} allData={allData} substitutions={gridSubstitutions} />}
                            {selectedClass && selectedDivision && !timetable && !isLoading && <div className="text-center p-8 mt-6 bg-yellow-100 text-yellow-800 rounded-lg"><p>No timetable found.</p></div>}
                        </motion.div>
                    )}

                    {activeTab === 'my_schedule' && user.role === 'lecturer' && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                            <h3 className="text-2xl font-bold text-center mb-4 text-indigo-700">My Personal Schedule</h3>
                            {mySchedule ? <TimetableGrid timetable={mySchedule} allData={allData} substitutions={gridSubstitutions} /> : <p className="text-center text-gray-500">Loading your schedule...</p>}
                        </motion.div>
                    )}

                    {activeTab === 'add_attendance' && user.role === 'lecturer' && <AttendanceManagement allData={allData} user={user} />}
                    {activeTab === 'view_students' && user.role === 'lecturer' && <AttendanceStatsViewer allData={allData} user={user} />}
                    {activeTab === 'view_attendance' && user.role === 'student' && <StudentViewAttendance user={user} />}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isCheckingAuth, setIsCheckingAuth] = useState(true);
            const [allData, setAllData] = useState({});
            const { isLoading, error, setError, callApi } = useApi();

            const fetchData = useCallback(async () => { try { const data = await callApi('data'); setAllData(data); setError(null); } catch (err) { } }, [callApi, setError]);
            const handleAddData = useCallback(async (endpoint, data) => { try { await callApi(endpoint, 'POST', data); await fetchData(); return true; } catch (err) { return false; } }, [callApi, fetchData]);

            useEffect(() => {
                const loggedInUser = sessionStorage.getItem('timetable-user');
                if (loggedInUser) setUser(JSON.parse(loggedInUser));
                setIsCheckingAuth(false);
            }, []);

            useEffect(() => { if (user) fetchData(); }, [user, fetchData]);

            const handleLogout = () => {
                const storedUser = sessionStorage.getItem("timetable-user");
                let isAdmin = false;
                if (storedUser) { try { isAdmin = JSON.parse(storedUser).role === "admin"; } catch (e) { } }
                sessionStorage.removeItem("timetable-user");
                const currentPath = window.location.pathname;
                const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
                const loginPage = isAdmin ? "admin_auth.html" : "user_login.html";
                window.location.replace(window.location.origin + basePath + loginPage);
            };

            if (isCheckingAuth) return <div className="min-h-screen flex items-center justify-center">Loading...</div>;

            if (!user) {
                const currentPath = window.location.pathname;
                if (!currentPath.endsWith('user_login.html') && !currentPath.endsWith('admin_auth.html')) {
                    const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
                    window.location.href = window.location.origin + basePath + 'user_login.html';
                }
                return null;
            }

            const renderDashboard = () => {
                switch (user.role) {
                    case 'admin': return <AdminDashboard user={user} allData={allData} onAddData={handleAddData} onUpdateTimetable={setAllData} isLoading={isLoading} apiError={error} onDataReload={fetchData} />;
                    case 'lecturer':
                    case 'student': return <LecturerStudentDashboard allData={allData} user={user} />;
                    default: return <p>Invalid user role.</p>;
                }
            };

            return (
                <div className="container mx-auto p-4 sm:p-6 lg:p-8">
                    <Header user={user} handleLogout={handleLogout} />
                    <AnimatePresence mode="wait">
                        <motion.div key={user.role} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}>
                            {renderDashboard()}
                        </motion.div>
                    </AnimatePresence>
                </div>
            );
        };

        if (!window.location.pathname.endsWith('user_login.html') && !window.location.pathname.endsWith('admin_auth.html')) {
            setupAnimation();
            ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
        }

    </script>
</body>

</html>
